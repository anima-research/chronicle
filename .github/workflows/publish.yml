name: Build & Publish

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true

    runs-on: ${{ matrix.os }}
    name: Build - ${{ matrix.target }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools (aarch64-linux)
        if: matrix.cross
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu

      - name: Install dependencies
        run: npm ci

      - name: Build native module
        run: npx napi build --platform --release --features napi-bindings --target ${{ matrix.target }}
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CXX_aarch64_unknown_linux_gnu: aarch64-linux-gnu-g++
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Upload native module
        uses: actions/upload-artifact@v4
        with:
          name: bindings-${{ matrix.target }}
          path: '*.node'
          if-no-files-found: error

      - name: Upload JS bindings (once)
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: js-bindings
          path: |
            index.js
            index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: build

    # OIDC trusted publishing: GitHub mints a short-lived id-token, npm CLI
    # exchanges it for a publish credential. No long-lived NPM_TOKEN secret.
    # npm-side config: npmjs.com -> package -> Settings -> Trusted Publishers
    # -> GitHub Actions, matching the repo + this workflow path.
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          # node 24 ships npm >= 11.5.1, required for OIDC publishing.
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Move artifacts to root
        run: |
          for dir in artifacts/bindings-*/; do
            cp "$dir"*.node .
          done
          ls -la *.node

      - name: Copy JS bindings
        run: cp artifacts/js-bindings/index.js artifacts/js-bindings/index.d.ts .

      - name: Verify package contents
        run: |
          ls -la index.js index.d.ts *.node
          node -e "require('./index.js')" || true
          # Binaries ship inside this tarball; the platform packages named by
          # napi prepublish were never published. A manifest that declares
          # them as optionalDependencies breaks 'npm ci' for every consumer
          # on npm >= 11 (missing-from-lock sync error), so fail the release
          # if they ever reappear.
          node -e "if (require('./package.json').optionalDependencies) { throw new Error('optionalDependencies in manifest — would break npm ci for consumers') }"

      - name: Publish
        run: npm publish --access public --provenance
